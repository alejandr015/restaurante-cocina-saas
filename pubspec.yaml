name: restaurante_cocina
description: "Mesly - Plataforma SaaS para restaurantes"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  supabase_flutter: ^2.12.4
  provider: ^6.1.5+1
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.1
  flutter_native_splash: ^2.4.6

flutter:
  uses-material-design: true
  
  assets:
    - assets/icons/

# ============================================================
# Configuración del ícono de la app (Mesly)
# Para regenerar: dart run flutter_launcher_icons
# ============================================================
flutter_launcher_icons:
  image_path: "assets/icons/icon_app_1024.png"
  android: "launcher_icon"
  min_sdk_android: 21
  adaptive_icon_background: "#1E1E1E"
  adaptive_icon_foreground: "assets/icons/foreground_android_1024.png"
  adaptive_icon_monochrome: "assets/icons/foreground_android_1024.png"
  ios: true
  remove_alpha_ios: true
  web:
    generate: true
    image_path: "assets/icons/icon_app_1024.png"
    background_color: "#1E1E1E"
    theme_color: "#FF6B35"
  windows:
    generate: true
    image_path: "assets/icons/icon_app_1024.png"
    icon_size: 256
  macos:
    generate: true
    image_path: "assets/icons/icon_app_1024.png"

# ============================================================
# Configuración del splash screen (Mesly)
# Para regenerar: dart run flutter_native_splash:create
# Nota: flutter_native_splash NO soporta Windows nativamente
# ============================================================
flutter_native_splash:
  color: "#1E1E1E"
  image: "assets/icons/foreground_android_1024.png"
  android_12:
    color: "#1E1E1E"
    image: "assets/icons/foreground_android_1024.png"
    icon_background_color: "#1E1E1E"
  android: true
  ios: true
  web: true
  fullscreen: false
